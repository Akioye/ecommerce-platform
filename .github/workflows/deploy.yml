name: Build and Deploy to EKS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER: ecommerce-cluster
  ECR_REGISTRY: 524178179037.dkr.ecr.us-east-1.amazonaws.com

jobs:
  deploy:
    name: Build, Push and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push inventory service
        run: |
          docker build -t $ECR_REGISTRY/inventory-service:${{ github.sha }} ./inventory-service
          docker push $ECR_REGISTRY/inventory-service:${{ github.sha }}
          docker tag $ECR_REGISTRY/inventory-service:${{ github.sha }} $ECR_REGISTRY/inventory-service:latest
          docker push $ECR_REGISTRY/inventory-service:latest

      - name: Build and push cart service
        run: |
          docker build -t $ECR_REGISTRY/cart-service:${{ github.sha }} ./cart-service
          docker push $ECR_REGISTRY/cart-service:${{ github.sha }}
          docker tag $ECR_REGISTRY/cart-service:${{ github.sha }} $ECR_REGISTRY/cart-service:latest
          docker push $ECR_REGISTRY/cart-service:latest

      - name: Build and push payment service
        run: |
          docker build -t $ECR_REGISTRY/payment-service:${{ github.sha }} ./payment-service
          docker push $ECR_REGISTRY/payment-service:${{ github.sha }}
          docker tag $ECR_REGISTRY/payment-service:${{ github.sha }} $ECR_REGISTRY/payment-service:latest
          docker push $ECR_REGISTRY/payment-service:latest

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $EKS_CLUSTER

      - name: Deploy to EKS with Helm
        run: |
          helm upgrade --install ecommerce ./helm/ecommerce \
            --set inventoryService.image=$ECR_REGISTRY/inventory-service:${{ github.sha }} \
            --set cartService.image=$ECR_REGISTRY/cart-service:${{ github.sha }} \
            --set paymentService.image=$ECR_REGISTRY/payment-service:${{ github.sha }}