version: "3.8"

services:
  inventory-service:
    build: ./inventory-service
    ports:
      - "8001:8001"
    networks:
      - ecommerce-network

  cart-service:
    build: ./cart-service
    ports:
      - "8002:8002"
    depends_on:
      - inventory-service
    networks:
      - ecommerce-network

  payment-service:
    build: ./payment-service
    ports:
      - "8003:8003"
    depends_on:
      - cart-service
      - inventory-service
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge